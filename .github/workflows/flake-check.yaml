name: Flake

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flake-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check flake
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Check flake
        run: nix flake check --print-build-logs

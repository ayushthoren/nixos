name: Update nightly release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: ubuntu-latest

    env:
      TAG_NAME: nightly
      ASSET_NAME: thoren-nixos.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create ZIP
        run: |
          mkdir -p dist
          git archive \
            --format=zip \
            --prefix="nixos/" \
            --output="dist/${ASSET_NAME}" \
            HEAD

      - name: Move nightly tag to this commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${TAG_NAME}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG_NAME}" --force

      - name: Update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$'Automated nightly package of the flake files. Use `git clone` on this repository instead if you want to stay up to date.\n\nCommit: '"${GITHUB_SHA}"$'\nRef: '"${GITHUB_REF}"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "Nightly Flake Package" \
              --notes "${NOTES}" \
              --prerelease \
              --target "${GITHUB_SHA}"
          else
            gh release create "${TAG_NAME}" \
              --verify-tag \
              --title "Nightly Flake Package" \
              --notes "${NOTES}" \
              --prerelease \
              --target "${GITHUB_SHA}"
          fi

      - name: Upload ZIP asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${TAG_NAME}" "dist/${ASSET_NAME}" --clobber